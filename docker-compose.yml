services:
  app:
    build: .
    expose:
      - "8000"
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/todo.db
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
